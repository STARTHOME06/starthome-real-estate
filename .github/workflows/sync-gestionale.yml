name: Sincronizza immobili dal gestionale

on:
  workflow_dispatch:
  schedule:
    # Più tentativi nella finestra notturna: GitHub può ritardare i job pianificati.
    # Il controllo Europe/Rome qui sotto impedisce comunque esecuzioni fuori 21:00-07:00.
    - cron: "17 19-23,0-5 * * *"

permissions:
  contents: write

concurrency:
  group: sync-gestionale
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Verifica finestra oraria italiana
        id: window
        shell: bash
        run: |
          hour="$(TZ=Europe/Rome date +%H)"
          if [[ "${{ github.event_name }}" == "schedule" || "${{ github.event_name }}" == "workflow_dispatch" ]] && (( 10#$hour >= 21 || 10#$hour < 7 )); then
            echo "allowed=true" >> "$GITHUB_OUTPUT"
          else
            echo "allowed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: steps.window.outputs.allowed == 'true'
        uses: actions/checkout@v4

      - name: Importa annunci e nuove immagini
        if: steps.window.outputs.allowed == 'true'
        env:
          GI_FEED_URL: ${{ secrets.GI_FEED_URL }}
        run: python3 scripts/sync_gestionale.py

      - name: Verifica JSON generato
        if: steps.window.outputs.allowed == 'true'
        run: |
          python3 -m json.tool data/gi-properties.json > /dev/null
          test "$(python3 -c 'import json; print(len(json.load(open("data/gi-properties.json"))))')" -gt 0

      - name: Pubblica gli aggiornamenti
        if: steps.window.outputs.allowed == 'true'
        run: |
          git config user.name "STARTHOME Sync"
          git config user.email "actions@users.noreply.github.com"
          git add data/gi-properties.json public/images/gestionale
          if git diff --cached --quiet; then
            echo "Nessun aggiornamento dal gestionale"
          else
            git commit -m "Sync immobili dal gestionale"
            git push
          fi

      - name: Finestra non valida
        if: steps.window.outputs.allowed != 'true'
        run: echo "Sincronizzazione non eseguita fuori dalla finestra 21:00-07:00 Europe/Rome."
